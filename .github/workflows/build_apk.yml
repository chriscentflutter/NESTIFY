name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Allows you to trigger it manually for testing

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true # <--- This makes your builds faster!
          
      - name: Install dependencies
        run: flutter pub get
        
      - name: Build APK
        # Note: If this fails due to "signing", change 'apk --release' to 'apk --debug'
        run: flutter build apk --release
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          # If you change to --debug above, change this path to app-debug.apk
          path: build/app/outputs/flutter-apk/app-release.apk