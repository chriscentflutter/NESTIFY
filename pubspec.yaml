name: nestify
description: "Nigerian Real Estate App - Rent, Buy, and Manage Properties"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  provider: ^6.1.1
  
  # Navigation
  go_router: ^17.0.0
  
  # UI Components
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1  # Using 3.3.1 for http 0.13.6 compatibility
  carousel_slider: ^5.1.2
  smooth_page_indicator: ^1.2.1  # Using 1.2.1 for vector_math compatibility
  modal_bottom_sheet: ^2.1.2  # Using 2.1.2 for flutterwave_standard compatibility
  flutter_staggered_grid_view: ^0.7.0
  
  # Authentication
  google_sign_in: ^7.2.0
  
  # Firestore & Storage
  
  # Payment Integration
  flutterwave_standard: ^1.0.6
  flutter_paystack: ^1.0.7
  
  # Maps & Location
  google_maps_flutter: ^2.5.3
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  
  # Media
  image_picker: ^1.0.7
  video_player: ^2.8.2
  photo_view: ^0.15.0
  
  # Storage & Caching
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # HTTP & API
  dio: ^5.4.0
  http: ^0.13.6
  
  # Notifications
  flutter_local_notifications: ^18.0.1
  
  # Utilities
  intl: ^0.17.0
  url_launcher: ^6.2.4
  permission_handler: ^12.0.1
  connectivity_plus: ^7.0.0
  uuid: ^4.3.3
  flutter_inappwebview: ^6.0.0
  file_picker: ^10.3.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/images/onboarding/
    - assets/icons/
  
  # Uncomment when you add the Inter font files
  # fonts:
  #   - family: Inter
  #     fonts:
  #       - asset: assets/fonts/Inter-Regular.ttf
  #       - asset: assets/fonts/Inter-Medium.ttf
  #         weight: 500
  #       - asset: assets/fonts/Inter-SemiBold.ttf
  #         weight: 600
  #       - asset: assets/fonts/Inter-Bold.ttf
  #         weight: 700
